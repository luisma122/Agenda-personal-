<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Agenda Personal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased">

    <nav class="bg-white shadow-md p-4 mb-8">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-orange-600 flex items-center gap-2">
                <i class="fas fa-calendar-check"></i> Agenda Personal
            </h1>
            <a href="https://github.com/luisma122" target="_blank" class="text-gray-600 hover:text-orange-500 transition">
                <i class="fab fa-github text-2xl"></i>
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pb-12">
        <header class="text-center mb-10">
            <h2 class="text-3xl font-extrabold text-gray-800 sm:text-4xl">Mi Horario y Eventos</h2>
            <p class="mt-4 text-lg text-gray-600">Gestión de actividades diarias sincronizadas en tiempo real.</p>
        </header>

        <section class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="bg-orange-500 p-4 flex justify-between items-center text-white">
                <span class="font-semibold flex items-center gap-2">
                    <i class="fas fa-sync-alt animate-spin-slow"></i> Google Calendar Activo
                </span>
                <span class="text-xs bg-orange-600 px-3 py-1 rounded-full">Modo Agenda</span>
            </div>

            <div class="relative w-full" style="padding-top: 60%; min-height: 450px;">
                <iframe 
                    src="https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=America%2FBogota&mode=AGENDA&src=OGtzOWVsYmFwZGRlYmNmYnA0OXNzcnMyN2E0ajA0NXBAaW1wb3J0LmNhbGVuZGFyLmdvb2dsZS5jb20&color=%23f4511e" 
                    class="absolute top-0 left-0 w-full h-full border-0"
                    frameborder="0" 
                    scrolling="no">
                </iframe>
            </div>
        </section>

        <footer class="mt-12 text-center text-gray-400 text-sm">
            <p>© 2026 Luisma122 - Desarrollado con HTML y Tailwind CSS</p>
        </footer>
    </main>

    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
        @media (max-width: 640px) {
            section { border-radius: 1rem; }
            main { padding-top: 1rem; }
        }
    </style>
</body>
</html>
