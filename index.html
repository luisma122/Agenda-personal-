<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Agenda Personal - Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'earth': {
                            '50': '#f4f3ee', '100': '#edede9', '200': '#f5ebe0', '300': '#e3d5ca',
                            '400': '#d6ccc2', '500': '#d5bdaf', '600': '#e0afa0', '700': '#bcb8b1',
                            '800': '#8a817c', '900': '#463f3a',
                        },
                    },
                    animation: {
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(10px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4f3ee;
            min-height: 100vh;
            color: #463f3a;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }

        /* Bordes Dinámicos Basados en Tiempos */
        .card-red { border: 2px solid #ef4444; }
        .card-yellow { border: 2px solid #f59e0b; }
        .card-green { border: 2px solid #10b981; }
        .card-done { border: 2px solid #d6ccc2; opacity: 0.7; }

        /* Checkbox Estilo Libreta */
        .notebook-checkbox {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }

        .notebook-checkbox input { position: absolute; opacity: 0; }

        .notebook-checkbox .checkmark {
            height: 1.4rem;
            width: 1.4rem;
            border-radius: 8px;
            border: 2px solid #d6ccc2;
            background: white;
            transition: all 0.2s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notebook-checkbox input:checked ~ .checkmark {
            background-color: #10b981; 
            border-color: #10b981;
        }

        .notebook-checkbox .checkmark::after {
            content: "";
            width: 6px;
            height: 11px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
            display: none;
            margin-bottom: 2px;
        }

        .notebook-checkbox input:checked ~ .checkmark::after { display: block; }

        /* Tachado suave */
        input:checked ~ .text-wrapper .task-text { text-decoration: line-through; opacity: 0.5; }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d6ccc2; border-radius: 10px; }

        /* Puntos Calendario */
        .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; margin: 0 1px; }
        .dot-red { background-color: #ef4444; }
        .dot-yellow { background-color: #f59e0b; }
        .dot-green { background-color: #10b981; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Barra de Navegación / Título -->
        <nav class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-earth-900 rounded-2xl flex items-center justify-center shadow-lg">
                    <i data-lucide="calendar" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-earth-900 tracking-tight">Mi Agenda</h1>
                    <p id="current-date-nav" class="text-earth-600 font-medium capitalize"></p>
                </div>
            </div>
            
            <!-- Leyenda de Estados -->
            <div class="flex flex-wrap gap-2 text-[10px] font-bold uppercase tracking-wider">
                <div class="bg-white border-2 border-red-500 px-3 py-2 rounded-xl flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-red-500"></span> 0-1 día
                </div>
                <div class="bg-white border-2 border-amber-500 px-3 py-2 rounded-xl flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-amber-500"></span> 2-3 días
                </div>
                <div class="bg-white border-2 border-emerald-500 px-3 py-2 rounded-xl flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span> +4 días
                </div>
            </div>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Columna Izquierda: Entrada y Lista -->
            <div class="lg:col-span-4 space-y-6">
                <section class="glass-panel p-6 rounded-[2.5rem] border-2 border-white shadow-sm">
                    <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5 text-earth-600"></i>
                        Añadir Tarea
                    </h2>
                    <div class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase text-earth-500 ml-1">¿Qué hay que hacer?</label>
                            <input type="text" id="task-input" placeholder="Ej: Cita médica..." 
                                class="w-full bg-white border-2 border-earth-100 rounded-2xl px-5 py-3 focus:border-earth-400 outline-none transition-all font-medium">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[10px] font-black uppercase text-earth-500 ml-1">Fecha</label>
                                <input type="date" id="task-date" class="w-full bg-white border-2 border-earth-100 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-earth-400">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black uppercase text-earth-500 ml-1">Hora</label>
                                <input type="time" id="task-time" class="w-full bg-white border-2 border-earth-100 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-earth-400">
                            </div>
                        </div>
                        
                        <button onclick="addTask()" class="w-full bg-earth-900 text-white font-bold py-4 rounded-2xl hover:bg-earth-800 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-xl shadow-earth-900/10">
                            Guardar Tarea
                            <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                </section>

                <section class="space-y-4">
                    <div class="flex items-center justify-between px-2">
                        <h3 id="list-title" class="text-xs font-black uppercase tracking-widest text-earth-700">Próximos Eventos</h3>
                        <button id="reset-filter" onclick="resetFilter()" class="hidden text-[10px] font-bold text-earth-500 bg-white px-2 py-1 rounded-lg border border-earth-200">
                            Ver todo
                        </button>
                    </div>
                    <ul id="task-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar"></ul>
                </section>
            </div>

            <!-- Columna Derecha: Calendario -->
            <div class="lg:col-span-8 space-y-6">
                <section class="glass-panel p-8 rounded-[2.5rem] border-2 border-white shadow-sm">
                    <div class="flex items-center justify-between mb-8">
                        <div>
                            <h2 id="calendar-month" class="text-2xl font-black text-earth-900 capitalize tracking-tight"></h2>
                            <p class="text-sm text-earth-500 font-medium">Gestiona tu tiempo visualmente</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="changeMonth(-1)" class="p-3 bg-white hover:bg-earth-50 border border-earth-100 rounded-xl transition-all">
                                <i data-lucide="chevron-left" class="w-5 h-5 text-earth-700"></i>
                            </button>
                            <button onclick="changeMonth(1)" class="p-3 bg-white hover:bg-earth-50 border border-earth-100 rounded-xl transition-all">
                                <i data-lucide="chevron-right" class="w-5 h-5 text-earth-700"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-7 gap-2 mb-4">
                        <div class="text-center text-[10px] font-black text-earth-400 uppercase tracking-tighter">Dom</div>
                        <div class="text-center text-[10px] font-black text-earth-400 uppercase tracking-tighter">Lun</div>
                        <div class="text-center text-[10px] font-black text-earth-400 uppercase tracking-tighter">Mar</div>
                        <div class="text-center text-[10px] font-black text-earth-400 uppercase tracking-tighter">Mié</div>
                        <div class="text-center text-[10px] font-black text-earth-400 uppercase tracking-tighter">Jue</div>
                        <div class="text-center text-[10px] font-black text-earth-400 uppercase tracking-tighter">Vie</div>
                        <div class="text-center text-[10px] font-black text-earth-400 uppercase tracking-tighter">Sáb</div>
                    </div>
                    
                    <div id="calendar-grid" class="grid grid-cols-7 gap-3"></div>
                </section>

                <!-- Mini Stats -->
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-white p-5 rounded-3xl border-2 border-red-100 shadow-sm flex flex-col items-center">
                        <span class="text-[10px] font-black uppercase text-red-400">Hoy / Mañana</span>
                        <p id="stat-red" class="text-3xl font-black text-red-600">0</p>
                    </div>
                    <div class="bg-white p-5 rounded-3xl border-2 border-amber-100 shadow-sm flex flex-col items-center">
                        <span class="text-[10px] font-black uppercase text-amber-400">Próximos</span>
                        <p id="stat-yellow" class="text-3xl font-black text-amber-600">0</p>
                    </div>
                    <div class="bg-white p-5 rounded-3xl border-2 border-emerald-100 shadow-sm flex flex-col items-center">
                        <span class="text-[10px] font-black uppercase text-emerald-400">Tranquilo</span>
                        <p id="stat-green" class="text-3xl font-black text-emerald-600">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('agenda_smart_tasks')) || [];
        let viewDate = new Date();
        let selectedFilterDate = null;

        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        window.onload = () => {
            const now = new Date();
            document.getElementById('task-date').value = now.toISOString().split('T')[0];
            document.getElementById('task-time').value = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            document.getElementById('current-date-nav').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            renderAll();
        };

        function getTaskStatus(task) {
            if (task.completed) return 'done';
            
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            
            const taskDate = new Date(task.date);
            taskDate.setHours(0, 0, 0, 0);
            
            const diffTime = taskDate - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays <= 1) return 'red';    // Mismo día o mañana
            if (diffDays <= 3) return 'yellow'; // Faltan más de 2 días (pero menos de 4)
            return 'green';                      // 4 días o más
        }

        function addTask() {
            const input = document.getElementById('task-input');
            const date = document.getElementById('task-date');
            const time = document.getElementById('task-time');

            if (!input.value.trim() || !date.value) return;

            const newTask = {
                id: Date.now(),
                text: input.value,
                date: date.value,
                time: time.value || "00:00",
                completed: false
            };

            tasks.push(newTask);
            input.value = '';
            renderAll();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            setTimeout(renderAll, 200);
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            renderAll();
        }

        function renderAll() {
            renderTasks();
            renderCalendar();
            renderStats();
            save();
            lucide.createIcons();
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            
            let sorted = [...tasks].sort((a,b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
            
            if (selectedFilterDate) {
                sorted = sorted.filter(t => t.date === selectedFilterDate);
            }

            if (sorted.length === 0) {
                list.innerHTML = `
                    <div class="py-12 text-center text-earth-400 bg-white/40 rounded-[2rem] border-2 border-dashed border-earth-200">
                        <p class="text-[10px] font-black uppercase tracking-widest">Nada pendiente</p>
                    </div>`;
                return;
            }

            sorted.forEach(task => {
                const status = getTaskStatus(task);
                const li = document.createElement('li');
                li.className = `glass-panel p-4 rounded-2xl flex items-center justify-between transition-all animate-slide-up card-${status}`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <label class="notebook-checkbox">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                            <span class="checkmark"></span>
                            <div class="text-wrapper ml-3">
                                <span class="task-text text-sm font-bold block text-earth-900 truncate">
                                    ${task.text}
                                </span>
                                <span class="text-[10px] font-black text-earth-500 uppercase">
                                    ${task.date.split('-').reverse().join('/')} • ${task.time}
                                </span>
                            </div>
                        </label>
                    </div>
                    <button onclick="deleteTask(${task.id})" class="text-earth-300 hover:text-red-500 p-2 transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                `;
                list.appendChild(li);
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthLabel = document.getElementById('calendar-month');
            grid.innerHTML = '';

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            monthLabel.innerText = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toISOString().split('T')[0];

            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let i = 1; i <= lastDate; i++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const cell = document.createElement('div');
                const isToday = dateStr === todayStr;
                const isSelected = dateStr === selectedFilterDate;

                cell.className = `h-14 rounded-2xl flex flex-col items-center justify-center cursor-pointer transition-all relative border-2
                    ${isSelected ? 'bg-earth-900 border-earth-900 text-white shadow-lg' : 'bg-white border-white hover:border-earth-200'}
                    ${isToday && !isSelected ? 'ring-2 ring-earth-800' : ''}`;
                
                let dotsHtml = '';
                const dayStatuses = new Set(dayTasks.map(t => getTaskStatus(t)));
                if (dayStatuses.has('red')) dotsHtml += '<span class="dot dot-red"></span>';
                if (dayStatuses.has('yellow')) dotsHtml += '<span class="dot dot-yellow"></span>';
                if (dayStatuses.has('green')) dotsHtml += '<span class="dot dot-green"></span>';

                cell.innerHTML = `
                    <span class="text-sm font-black">${i}</span>
                    <div class="flex mt-1">${dotsHtml}</div>
                `;
                
                cell.onclick = () => filterByDate(dateStr);
                grid.appendChild(cell);
            }
        }

        function filterByDate(dateStr) {
            if (selectedFilterDate === dateStr) {
                resetFilter();
            } else {
                selectedFilterDate = dateStr;
                document.getElementById('list-title').innerText = `Tareas ${dateStr.split('-').reverse().join('/')}`;
                document.getElementById('reset-filter').classList.remove('hidden');
                renderAll();
            }
        }

        function resetFilter() {
            selectedFilterDate = null;
            document.getElementById('list-title').innerText = "Próximos Eventos";
            document.getElementById('reset-filter').classList.add('hidden');
            renderAll();
        }

        function renderStats() {
            let r = 0, y = 0, g = 0;
            tasks.forEach(t => {
                if (t.completed) return;
                const s = getTaskStatus(t);
                if (s === 'red') r++;
                else if (s === 'yellow') y++;
                else if (s === 'green') g++;
            });
            document.getElementById('stat-red').innerText = r;
            document.getElementById('stat-yellow').innerText = y;
            document.getElementById('stat-green').innerText = g;
        }

        function changeMonth(step) {
            viewDate.setMonth(viewDate.getMonth() + step);
            renderCalendar();
            lucide.createIcons();
        }

        function save() {
            localStorage.setItem('agenda_smart_tasks', JSON.stringify(tasks));
        }
    </script>
</body>
</html>
